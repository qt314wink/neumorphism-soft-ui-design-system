<!DOCTYPE html>
<html lang="en" data-version="5.0.0">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphism Studio v5.0 | Flourishing Earth</title>
    <meta name="description" content="Fluid Physics Neumorphism Design System by Jennipher Troup">
    <meta name="author" content="Jennipher Troup, Flourishing Earth">
    
    <style>
        /* === FLUID PHYSICS SYSTEM === */
        :root {
            /* Core Surface */
            --ne-global-bg: #e8e4e1;
            --ne-global-bg-rgb: 232, 228, 225;
            --ne-global-light: rgba(255,255,255,0.75);
            --ne-global-shadow: rgba(139,123,111,0.35);
            --ne-global-text: #5a5048;
            --ne-global-accent: #6b5b4f;
            
            /* Physics Constants */
            --ne-elevation: 12px;
            --ne-intensity: 0.7;
            --ne-angle: 315deg;
            --ne-blur: 2;
            --ne-press: 0.4;
            
            /* Fluid Motion */
            --ne-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ne-smooth: cubic-bezier(0.4, 0, 0.2, 1);
            --ne-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
            
            /* Typography */
            --ne-font-display: 'Georgia', 'Times New Roman', serif;
            --ne-font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --ne-font-mono: 'SF Mono', 'JetBrains Mono', Consolas, monospace;
        }

        /* Dark Mode Override */
        [data-theme="dark"] {
            --ne-global-bg: #1a1a1e;
            --ne-global-bg-rgb: 26, 26, 30;
            --ne-global-light: rgba(255,255,255,0.05);
            --ne-global-shadow: rgba(0,0,0,0.6);
            --ne-global-text: #c8c4c1;
            --ne-global-accent: #a09080;
        }

        /* System Preference Detection */
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --ne-global-bg: #1a1a1e;
                --ne-global-bg-rgb: 26, 26, 30;
                --ne-global-light: rgba(255,255,255,0.05);
                --ne-global-shadow: rgba(0,0,0,0.6);
                --ne-global-text: #c8c4c1;
                --ne-global-accent: #a09080;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-family: var(--ne-font-body);
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--ne-global-bg);
            color: var(--ne-global-text);
            min-height: 100vh;
            transition: background 0.6s var(--ne-smooth), color 0.6s var(--ne-smooth);
            overflow-x: hidden;
        }

        /* Structural and additional CSS remains the same */

    </style>
</head>
<body>
    <div class="ne-container">
        <header class="ne-header">
            <h1>Neumorphism Studio v5.0</h1>
            <p>Fluid Physics and Beyond</p>
        </header>

        <script>
            /* Basic JavaScript code for theme toggling */
        </script>

    </div>
</body>
</html>
